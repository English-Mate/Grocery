<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShareMyList</title>
</head>
<body>
  <h1>ShareMyList</h1>

  <!-- Input to add a new list -->
  <input type="text" id="listTitle" placeholder="Enter list title">
  <button onclick="addList()">Add List</button>
  <button onclick="exportLists()">Export JSON</button>
  <input type="file" id="importFile" accept="application/json" onchange="importLists(event)">
  
  <!-- Container to show lists -->
  <h2>Lists</h2>
  <div id="listContainer"></div>

  <!-- Firebase + Firestore -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAbx_neer7BI5SeMD0M7_kTNdhVm5qzOU0",
      authDomain: "sharemylist-1111.firebaseapp.com",
      projectId: "sharemylist-1111",
      storageBucket: "sharemylist-1111.firebasestorage.app",
      messagingSenderId: "611076330863",
      appId: "1:611076330863:web:59b8ab413b8ca23eed449a",
      measurementId: "G-GMRBT259X8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Add a new list
    async function addList() {
      const titleInput = document.getElementById("listTitle");
      const title = titleInput.value.trim();
      if (!title) return;

      await addDoc(collection(db, "lists"), {
        title,
        createdAt: new Date()
      });

      titleInput.value = "";
    }

    // Listen for real-time updates
    let currentLists = [];
    function listenLists() {
      onSnapshot(collection(db, "lists"), (snapshot) => {
        const listContainer = document.getElementById("listContainer");
        listContainer.innerHTML = "";
        currentLists = [];

        snapshot.docs.forEach(doc => {
          const list = { id: doc.id, ...doc.data() };
          currentLists.push(list);

          const div = document.createElement("div");
          div.textContent = list.title;
          listContainer.appendChild(div);
        });
      });
    }

    // Export lists as JSON file
    function exportLists() {
      const blob = new Blob([JSON.stringify(currentLists, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "sharemylist.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    // Import lists from JSON file
    async function importLists(event) {
      const file = event.target.files[0];
      if (!file) return;
      const text = await file.text();
      const importedLists = JSON.parse(text);

      for (const list of importedLists) {
        await addDoc(collection(db, "lists"), {
          title: list.title,
          createdAt: new Date(list.createdAt || Date.now())
        });
      }
    }

    // Start listening
    listenLists();
  </script>
</body>
</html>
