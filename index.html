<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping List Builder</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .checked-item { opacity: 0.6; }
    .checked-item .item-text { text-decoration: line-through; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-8 transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100">
  <main class="max-w-xl mx-auto">
    
    <header class="mb-8 text-center relative">
      <h1 class="text-4xl font-bold mb-2 tracking-tight">Shopping List</h1>
      <p class="text-slate-500 dark:text-slate-400">Add, edit, sort, and share your lists instantly</p>
    </header>

    <div class="flex flex-wrap items-center justify-between gap-3 mb-6 bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors">
      <div class="flex gap-2">
        <button onclick="toggleDarkMode()" id="theme-btn" class="px-3 py-2 text-sm font-medium bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 rounded-lg flex items-center gap-2 transition-colors">
          </button>
        <button onclick="shareOrExportList()" class="px-3 py-2 text-sm font-medium bg-teal-600 hover:bg-teal-700 text-white rounded-lg flex items-center gap-2 transition-colors">
          <i data-lucide="share-2" class="w-4 h-4"></i> Share / Export
        </button>
      </div>
      
      <div class="flex items-center gap-2">
        <select id="sort-select" onchange="sortItems()" class="bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-colors text-slate-800 dark:text-slate-100">
          <option value="default">Sort by…</option>
          <option value="alpha">Alphabetical</option>
          <option value="checked">Unchecked First</option>
          <option value="category">Category</option>
        </select>
      </div>
    </div>

    <div id="stats-bar" class="mb-4 text-sm text-slate-500 dark:text-slate-400 px-1 flex justify-between hidden">
      <span id="progress-text">0 / 0 items completed</span>
      <span id="clear-all-link" onclick="clearAll()" class="text-red-500 hover:text-red-600 cursor-pointer font-medium flex items-center gap-1"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Clear All</span>
    </div>

    <form id="add-form" class="grid grid-cols-12 gap-2 mb-6 bg-white dark:bg-slate-800 p-3 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 transition-colors" onsubmit="addItem(event)">
      <div class="col-span-12 sm:col-span-5">
        <input id="name-input" type="text" placeholder="Item name..." class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-colors text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500" required>
      </div>
      <div class="col-span-5 sm:col-span-3">
        <input id="qty-input" type="number" placeholder="Qty" step="0.01" min="0.01" class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-colors text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500">
      </div>
      <div class="col-span-7 sm:col-span-3">
        <input id="cat-input" type="text" placeholder="Category" class="w-full bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-colors text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500">
      </div>
      <button type="submit" class="col-span-12 sm:col-span-1 bg-teal-600 hover:bg-teal-700 text-white font-medium rounded-lg p-2 transition-colors flex items-center justify-center">
        <i data-lucide="plus" class="w-5 h-5"></i>
      </button>
    </form>

    <div id="item-list" class="space-y-2.5"></div>
    
    <div id="empty-msg" class="text-center py-12 bg-white dark:bg-slate-800 rounded-xl border border-dashed border-slate-300 dark:border-slate-700 transition-colors">
      <i data-lucide="shopping-basket" class="w-12 h-12 mx-auto mb-3 text-slate-400 opacity-60"></i>
      <p class="italic text-slate-400">Your shopping list is empty</p>
    </div>

  </main>

<script>
let items = [];
let nextId = 1;
let editingId = null;
const BASE_URL = "https://english-mate.github.io/Grocery/";

function addItem(e) {
  e.preventDefault();
  const name = document.getElementById('name-input').value.trim();
  const qty = parseFloat(document.getElementById('qty-input').value) || 1;
  const category = document.getElementById('cat-input').value.trim() || 'General';
  
  if (!name) return;
  
  items.push({ id: nextId++, name, qty, category, checked: false });
  e.target.reset();
  saveToStorage();
  renderList();
}

function removeItem(id) {
  items = items.filter(i => i.id !== id);
  if (editingId === id) editingId = null;
  saveToStorage();
  renderList();
}

function toggleItem(id) {
  const item = items.find(i => i.id === id);
  if (item) item.checked = !item.checked;
  saveToStorage();
  renderList();
}

function startInlineEdit(id) {
  editingId = id;
  renderList();
}

function cancelInlineEdit() {
  editingId = null;
  renderList();
}

function saveInlineEdit(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;

  const newName = document.getElementById(`edit-name-${id}`).value.trim();
  const newQty = parseFloat(document.getElementById(`edit-qty-${id}`).value);
  const newCat = document.getElementById(`edit-cat-${id}`).value.trim();

  if (newName) item.name = newName;
  if (!isNaN(newQty) && newQty > 0) item.qty = newQty;
  if (newCat) item.category = newCat;

  editingId = null;
  saveToStorage();
  renderList();
}

function clearAll() {
  if (confirm("Are you sure you want to clear the entire list?")) {
    items = [];
    editingId = null;
    saveToStorage();
    renderList();
  }
}

function saveToStorage() {
  localStorage.setItem('shoppingList', JSON.stringify(items));
}

function checkUrlForSharedList() {
  const urlParams = new URLSearchParams(window.location.search);
  const dataParam = urlParams.get('list');
  
  if (dataParam) {
    try {
      const jsonString = atob(dataParam);
      const parsedItems = JSON.parse(jsonString);
      
      if (Array.isArray(parsedItems) && parsedItems.length > 0) {
        if (confirm(`You are opening a shared list with ${parsedItems.length} items. Would you like to load it? (This replaces your current local list)`)) {
          items = parsedItems;
          nextId = Math.max(...items.map(i => i.id), 0) + 1;
          saveToStorage();
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      }
    } catch (e) {
      console.error("Failed to parse shared list data:", e);
    }
  }
}

function loadFromStorage() {
  const stored = localStorage.getItem('shoppingList');
  if (stored) {
    items = JSON.parse(stored);
    nextId = Math.max(...items.map(i => i.id), 0) + 1;
  }
  
  // Apply dark mode on initial load if saved
  if (localStorage.getItem('darkMode') === 'enabled') {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
  updateThemeButton();
}

function formatQty(n) {
  return n % 1 === 0 ? n.toString() : n.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
}

// Sort items functionality
function sortItems() {
  const sortBy = document.getElementById('sort-select').value;
  if (sortBy === 'alpha') items.sort((a,b) => a.name.localeCompare(b.name));
  if (sortBy === 'checked') items.sort((a,b) => a.checked - b.checked);
  if (sortBy === 'category') items.sort((a,b) => a.category.localeCompare(b.category));
  renderList();
}

function shareOrExportList() {
  if (items.length === 0) return alert("Your list is empty!");

  const compactData = items.map(({name, qty, category, checked}) => ({name, qty, category, checked}));
  const jsonString = JSON.stringify(compactData);
  const base64Data = btoa(unescape(encodeURIComponent(jsonString)));
  const finalShareUrl = `${BASE_URL}?list=${base64Data}`;

  if (navigator.share) {
    navigator.share({
      title: 'My Shopping List',
      text: 'Check out my shopping list!',
      url: finalShareUrl
    }).catch(err => console.log("Error sharing:", err));
  } else {
    navigator.clipboard.writeText(finalShareUrl).then(() => {
      alert("Shareable list link copied to clipboard! Send it to anyone to load your list.");
    }).catch(err => {
      alert("Failed to copy automatically. Here is the link:\n\n" + finalShareUrl);
    });
  }
}

function toggleDarkMode() {
  // Toggle the dark class on HTML element (crucial for Tailwind)
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
  updateThemeButton();
}

function updateThemeButton() {
  const btn = document.getElementById('theme-btn');
  if (!btn) return;
  const isDark = document.documentElement.classList.contains('dark');
  btn.innerHTML = isDark 
    ? `<i data-lucide="sun" class="w-4 h-4 text-amber-400"></i> Light Mode` 
    : `<i data-lucide="moon" class="w-4 h-4"></i> Dark Mode`;
  lucide.createIcons();
}

function renderList() {
  const container = document.getElementById('item-list');
  const emptyMsg = document.getElementById('empty-msg');
  const statsBar = document.getElementById('stats-bar');
  const progressText = document.getElementById('progress-text');

  emptyMsg.classList.toggle('hidden', items.length > 0);
  statsBar.classList.toggle('hidden', items.length === 0);

  const checkedCount = items.filter(i => i.checked).length;
  progressText.textContent = `${checkedCount} of ${items.length} item${items.length === 1 ? '' : 's'} checked`;

  container.innerHTML = '';
  
  items.forEach(item => {
    const isEditing = item.id === editingId;
    const div = document.createElement('div');
    div.className = `flex flex-col sm:flex-row sm:items-center gap-3 p-3.5 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm transition-all ${item.checked ? 'checked-item bg-slate-50/50 dark:bg-slate-800/40' : ''}`;
    
    if (isEditing) {
      div.innerHTML = `
        <div class="flex-1 grid grid-cols-12 gap-2 w-full">
          <input id="edit-name-${item.id}" type="text" value="${item.name}" class="col-span-12 sm:col-span-5 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
          <input id="edit-qty-${item.id}" type="number" step="0.01" value="${item.qty}" class="col-span-4 sm:col-span-3 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
          <input id="edit-cat-${item.id}" type="text" value="${item.category}" class="col-span-8 sm:col-span-4 bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100 rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>
        <div class="flex items-center gap-2 justify-end mt-2 sm:mt-0">
          <button onclick="saveInlineEdit(${item.id})" class="text-teal-600 hover:text-teal-700 p-1"><i data-lucide="check" class="w-5 h-5"></i></button>
          <button onclick="cancelInlineEdit()" class="text-slate-400 hover:text-slate-500 p-1"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
      `;
    } else {
      div.innerHTML = `
        <div class="flex items-center gap-3 flex-1 min-w-0">
          <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleItem(${item.id})" class="w-5 h-5 rounded accent-teal-600 dark:accent-teal-500 cursor-pointer shrink-0">
          <div class="flex flex-col min-w-0">
            <span class="font-medium item-text text-slate-900 dark:text-slate-100 truncate">${item.name}</span>
            <div class="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-400 mt-0.5">
              <span class="bg-slate-100 dark:bg-slate-700 px-1.5 py-0.5 rounded font-mono font-medium">Qty: ${formatQty(item.qty)}</span>
              <span class="inline-flex items-center gap-1"><i data-lucide="tag" class="w-3 h-3"></i> ${item.category}</span>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-1 justify-end mt-2 sm:mt-0 opacity-80 hover:opacity-100 transition-opacity">
          <button onclick="startInlineEdit(${item.id})" class="text-blue-500 hover:bg-blue-50 dark:hover:bg-slate-700 p-1.5 rounded-lg transition-colors"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
          <button onclick="removeItem(${item.id})" class="text-rose-500 hover:bg-rose-50 dark:hover:bg-slate-700 p-1.5 rounded-lg transition-colors"><i data-lucide="trash" class="w-4 h-4"></i></button>
        </div>
      `;
    }
    container.appendChild(div);
  });
  lucide.createIcons();
}

document.addEventListener('DOMContentLoaded', () => {
  loadFromStorage();
  checkUrlForSharedList();
  renderList();
});
</script>
</body>
</html>
